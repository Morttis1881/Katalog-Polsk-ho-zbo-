<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Polského Zboží</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .product-card { transition: all 0.3s; }
    .product-card:hover { transform: translateY(-8px); }
  </style>
</head>
<body class="bg-gray-50 p-6">

  <h1 class="text-4xl font-bold text-center mb-8">Katalog Polského Zboží</h1>

  <div id="status" class="text-center mb-6 text-lg font-medium">Načítám data...</div>

  <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto"></div>

  <script>
    async function loadCatalog() {
      const status = document.getElementById('status');
      try {
        const response = await fetch('data.json');
        if (!response.ok) throw new Error('HTTP error: ' + response.status);
        const data = await response.json();
        status.textContent = 'Načteno ' + data.products.length + ' produktů';
        renderProducts(data.products);
      } catch (error) {
        status.innerHTML = '<span style="color:red">Chyba při načítání dat: ' + error.message + '</span>';
      }
    }

    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = products.map(function(p) {
        var imgHtml = p.imageData
          ? '<img src="' + p.imageData + '" class="max-h-full max-w-full object-contain" alt="' + (p.name || '') + '">'
          : '<span class="text-gray-400 text-4xl">📦</span>';
        var noteHtml = p.note
          ? '<p class="text-orange-600 text-sm">' + p.note + '</p>'
          : '';
        var price = p.price && p.price > 0 ? p.price + ' Kč' : 'Cena na dotaz';
        return '<div class="product-card bg-white rounded-2xl shadow p-4 cursor-pointer hover:shadow-xl">'
          + '<div class="h-48 flex items-center justify-center bg-gray-100 rounded-xl mb-4">' + imgHtml + '</div>'
          + '<h3 class="font-bold text-lg">' + (p.name || '') + '</h3>'
          + '<p class="text-sm text-gray-500">' + (p.code || '') + '</p>'
          + '<p class="text-xl font-bold text-green-600 mt-2">' + price + '</p>'
          + noteHtml
          + '</div>';
      }).join('');
    }

    loadCatalog();
  </script>
</body>
</html>
