<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Polského Zboží</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .product-card { transition: all 0.3s; }
    .product-card:hover { transform: translateY(-8px); }
  </style>
</head>
<body class="bg-gray-50 p-6">

  <h1 class="text-4xl font-bold text-center mb-8">Katalog Polského Zboží</h1>

  <div id="status" class="text-center mb-6 text-lg font-medium">Načítám data...</div>

  <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto"></div>

  <script>
    async function loadCatalog() {
      const status = document.getElementById('status');
      
      try {
        console.log("Pokouším se načíst data.json...");
        const response = await fetch('data.json');
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        console.log("Data načtena:", data.products.length, "produktů");
        
        status.textContent = `Načteno ${data.products.length} produktů`;
        renderProducts(data.products);
        
      } catch (error) {
        console.error("Chyba:", error);
        status.innerHTML = `
          <span class="text-red-600">Chyba při načítání dat:</span><br>
          ${error.message}<br><br>
          Zkontroluj, jestli soubor <strong>data.json</strong> existuje v kořeni repozitáře.
        `;
      }
    }

    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = products.map(p => `
        <div onclick="alert('Kliknuto: ${p.name} — cena \( {p.price} Kč\\n\\n \){p.description.substring(0,150)}...')" 
             class="bg-white rounded-2xl shadow p-4 cursor-pointer hover:shadow-xl">
          <div class="h-48 flex items-center justify-center bg-gray-100 rounded-xl mb-4">
            <img src="\( {p.imageData}" class="max-h-full max-w-full object-contain" alt=" \){p.name}">
          </div>
          <h3 class="font-bold text-lg">${p.name}</h3>
          <p class="text-sm text-gray-500">${p.code}</p>
          <p class="text-xl font-bold text-green-600 mt-2">${p.price} Kč</p>
          \( {p.note ? `<p class="text-orange-600 text-sm"> \){p.note}</p>` : ''}
        </div>
      `).join('');
    }

    // Spustit načítání
    loadCatalog();
  </script>
</body>
</html>
