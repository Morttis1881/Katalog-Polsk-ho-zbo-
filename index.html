<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Polského Zboží</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .product-card { transition: all 0.3s ease; }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .modal { animation: modalPop 0.3s ease; }
    @keyframes modalPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen">

  <div class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold text-center mb-2">Katalog Polského Zboží</h1>
    <p class="text-center text-gray-500 dark:text-gray-400 mb-8">Klikni na produkt pro detail</p>

    <!-- Search -->
    <div class="max-w-xl mx-auto mb-8">
      <div class="relative">
        <input id="searchInput" 
               type="text" 
               placeholder="Hledat podle názvu, kódu nebo popisu..." 
               class="w-full px-5 py-4 pl-12 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-2xl focus:outline-none focus:border-blue-500 text-lg">
        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>
    </div>

    <!-- Category Filters -->
    <div id="categoryFilters" class="flex flex-wrap gap-3 justify-center mb-10"></div>

    <!-- Products Grid -->
    <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  </div>

  <!-- Modal -->
  <div id="productModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="modal bg-white dark:bg-gray-900 rounded-3xl max-w-2xl w-full max-h-[95vh] overflow-hidden">
      <div class="relative">
        <button onclick="closeModal()" 
                class="absolute top-4 right-4 z-10 bg-black/50 hover:bg-black/70 text-white w-10 h-10 rounded-full flex items-center justify-center text-xl">
          ✕
        </button>
        
        <img id="modalImage" class="w-full max-h-[50vh] object-contain bg-gray-100 dark:bg-gray-800" alt="">
        
        <div class="p-6">
          <div class="flex justify-between items-start mb-4">
            <h2 id="modalName" class="text-3xl font-bold"></h2>
            <div class="text-right">
              <div id="modalPrice" class="text-3xl font-bold text-green-600"></div>
              <div id="modalNote" class="text-sm text-gray-500"></div>
            </div>
          </div>
          
          <p id="modalCode" class="text-gray-500 mb-4"></p>
          
          <div class="prose dark:prose-invert max-w-none">
            <h3 class="text-lg font-semibold mb-2">Detailní popis:</h3>
            <pre id="modalDescription" class="whitespace-pre-wrap text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-800 p-4 rounded-2xl"></pre>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let products = [];
    let currentFilter = "Vše";

    async function loadData() {
      const response = await fetch('data.json');
      const data = await response.json();
      products = data.products;
      renderCategories();
      renderProducts(products);
    }

    function renderCategories() {
      const categories = ["Vše", ...new Set(products.map(p => p.category))];
      const container = document.getElementById('categoryFilters');
      container.innerHTML = categories.map(cat => `
        <button onclick="filterCategory('${cat}')" 
                class="category-btn px-5 py-2 rounded-full text-sm font-medium transition-all
                ${cat === currentFilter ? 'bg-blue-600 text-white' : 'bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 border border-gray-300 dark:border-gray-700'}">
          ${cat}
        </button>
      `).join('');
    }

    function filterCategory(cat) {
      currentFilter = cat;
      renderCategories();
      const filtered = cat === "Vše" ? products : products.filter(p => p.category === cat);
      renderProducts(filtered);
    }

    function renderProducts(filteredProducts) {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = filteredProducts.map(product => `
        <div onclick="showProduct('${product.id}')" 
             class="product-card bg-white dark:bg-gray-900 rounded-3xl overflow-hidden shadow-sm border border-gray-200 dark:border-gray-800 cursor-pointer">
          <div class="h-56 bg-gray-100 dark:bg-gray-800 flex items-center justify-center p-4">
            <img src="${product.imageData}" 
                 class="max-h-full max-w-full object-contain" 
                 alt="${product.name}">
          </div>
          <div class="p-5">
            <div class="flex justify-between items-start">
              <div>
                <h3 class="font-semibold text-lg">${product.name}</h3>
                <p class="text-sm text-gray-500">${product.code}</p>
              </div>
              <div class="text-right">
                <div class="text-2xl font-bold text-green-600">${product.price} Kč</div>
                \( {product.note ? `<div class="text-xs text-orange-600"> \){product.note}</div>` : ''}
              </div>
            </div>
            <p class="text-xs text-gray-400 mt-3 line-clamp-2">${product.shortDescription || product.description.substring(0, 120)}...</p>
          </div>
        </div>
      `).join('');
    }

    function showProduct(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      document.getElementById('modalImage').src = product.imageData;
      document.getElementById('modalName').textContent = product.name;
      document.getElementById('modalCode').textContent = product.code;
      document.getElementById('modalPrice').textContent = `${product.price} Kč`;
      document.getElementById('modalNote').textContent = product.note || '';
      document.getElementById('modalDescription').textContent = product.description;
      
      document.getElementById('productModal').classList.remove('hidden');
      document.getElementById('productModal').classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('productModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // Search functionality
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = products.filter(p => 
        p.name.toLowerCase().includes(term) ||
        p.code.toLowerCase().includes(term) ||
        p.description.toLowerCase().includes(term)
      );
      renderProducts(filtered);
    });

    // Load data on start
    loadData();
  </script>
</body>
</html>
